# True color (24-bit) support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"

# Change prefix key from Ctrl-b to backtick
unbind C-b
set -g prefix `
bind ` send-prefix

# Second prefix (Ctrl-b) for phone/remote use where backtick is awkward
set -g prefix2 C-b
bind C-b send-prefix -2

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when one is closed
set-option -g renumber-windows on

# Mouse mode
set -g mouse off

# Allow escape sequences from inner programs (e.g. Claude Code) to pass through to the outer terminal for notifications and progress indicators
set -g allow-passthrough on

# Automatic window renaming
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g status-interval 1

# New windows open in current directory, inserted to the right
bind c new-window -a -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Repeatable window navigation
bind -r n next-window
bind -r p previous-window
set -g repeat-time 333

# Move window left/right within session
bind-key -r S-Left swap-window -t -1\; select-window -t -1
bind-key -r S-Right swap-window -t +1\; select-window -t +1

# powerline
run-shell "powerline-config tmux setup"

# Per-window colors from TAB_COLOR (set by direnv via @tab_color user option)
# Claude indicator from @claude_indicator (set by tmux-titles plugin)
# Active window: bold white text on project color, with powerline arrows
set -g window-status-current-format "#{?@tab_color,#[fg=colour233 bg=#{@tab_color}]#[fg=colour231 bg=#{@tab_color} bold]#I#F #{?@claude_indicator,#{@claude_indicator} ,}#W #[fg=#{@tab_color} bg=colour233],#[fg=colour233 bg=colour31 nobold noitalics nounderscore]#[fg=colour117 bg=colour31 nobold noitalics nounderscore]#I#F #[fg=colour231 bg=colour31 bold noitalics nounderscore]#{?@claude_indicator,#{@claude_indicator} ,}#W #[fg=colour31 bg=colour233 nobold noitalics nounderscore]}"
# Inactive windows: dimmer text on project color
set -g window-status-format "#{?@tab_color,#[fg=colour253 bg=#{@tab_color}]#I#F #{?@claude_indicator,#{@claude_indicator} ,}#W #[fg=#{@tab_color} bg=colour233],#[fg=colour244 bg=colour233 nobold noitalics nounderscore]#I#F #[fg=colour240 bg=colour233 nobold noitalics nounderscore]#[default]#{?@claude_indicator,#{@claude_indicator} ,}#W }"

# continuum
set -g @continuum-restore 'on'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# (run inside gssproxy2 once to download new plugins)
run '~/.config/tmux/plugins/tpm/tpm'
