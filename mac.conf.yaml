- defaults:
      link:
          relink: true
          force: false
      shell:
          stdout: true
          stderr: true

- clean: ['~']

- create:
      - ~/.1password
      - ~/.config/yt-dlp

# Must precede the link block: ~/.secrets.local targets `secrets`, which does
# not exist until op resolves the template, and dotbot fails a link whose
# source is missing. secrets.tpl is gitignored, so a fresh clone has none;
# touch keeps the link source present without clobbering an existing secrets.
- shell:
      - command: if [ -f secrets.tpl ]; then op inject --force --in-file secrets.tpl --out-file secrets; else touch secrets; fi && chmod 600 secrets
        description: 🔐 Resolving op:// references into secrets

- link:
      ~/.1password/agent.sock: ~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock
      ~/.alias.local:
          path: alias.mac
      ~/.config/1Password/ssh/agent.toml:
          path: config/1Password/ssh/agent.toml
          force: true
      ~/.config/yt-dlp/config:
          path: config/yt-dlp/config
      ~/.config/git/config.local:
          path: config/git/config.mac
          force: true
      ~/.env.local:
          path: env.mac
      ~/.secrets.local:
          path: secrets
      ~/.iterm2_shell_integration.zsh:
      ~/.iterm2:
      ~/.ssh/config:
          path: ssh/config
          create: true
      ~/.ssh/factorio_id_ed25519.pub:
          path: ssh/factorio_id_ed25519.pub
          create: true
      ~/.ssh/id_ed25519.pub:
          path: ssh/id_ed25519.pub
          create: true
      ~/.zprofile.local:
          path: zprofile.mac
      ~/.zshrc.local:
          path: zshrc.mac

- shell:
      - command: pipx install powerline-status
        description: 🎨 Installing powerline
      - command: op inject --force --in-file bin/woof.tpl --out-file bin/woof --force && chmod +x bin/woof
        description: 🔐 Injecting secrets into bin/woof
      - claude plugin install context7@claude-plugins-official
      - claude plugin install imessage@claude-plugins-official
