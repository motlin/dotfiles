- defaults:
      link:
          relink: true
          force: false
      shell:
          stdout: true
          stderr: true

- clean: ['~']

- link:
      ~/.config/git/config.local:
          path: config/git/config.2s
          force: true
      ~/.env.local:
          path: env.2s
      ~/.p10k.local.zsh:
          path: p10k.2s
      ~/.zshrc.local:
          path: zshrc.2s
